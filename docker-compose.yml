services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - .env

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery:
      build: .
      command: celery -A wapi worker --loglevel=info
      volumes:
        - .:/app
      environment:
        - DJANGO_SETTINGS_MODULE=wapi.settings
        - CELERY_BROKER_URL=redis://redis:6379/0
        - DATABASE_URL=postgres://admin:password@db:5432/wapi_db
      depends_on:
        - db
        - redis
        - web 

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - wapi_media:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis


volumes:
  postgres_data:
  wapi_media: